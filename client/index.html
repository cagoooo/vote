<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <!-- 強制亮色：避免 OS 深色偏好讓瀏覽器把 input / scrollbar / form widget 套成深色 -->
  <meta name="color-scheme" content="light only" />
  <meta name="theme-color" content="#FEF9E7" />
  <meta name="supported-color-schemes" content="light" />
  <link rel="icon" type="image/png" href="favicon.png" />

  <!-- Playful Campus 字型：Nunito（圓潤、活潑、適合教育情境） -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="即時投票系統" />
  <meta property="og:description" content="即時、互動的教室投票平台，打造的數位化投票解決方案" />
  <meta property="og:image" content="screen.png" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="即時投票系統" />
  <meta name="twitter:description" content="即時、互動的教室投票平台，打造的數位化投票解決方案" />
  <meta name="twitter:image" content="screen.png" />

  <script type="text/javascript">
    // GitHub Pages SPA 404 Hack
    (function (l) {
      if (l.search[1] === '/') {
        var decoded = l.search.slice(1).split('&').map(function (s) {
          return s.replace(/~and~/g, '&')
        }).join('?');
        window.history.replaceState(null, null,
          l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    }(window.location))
  </script>
  <title>即時投票系統</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="src/main.tsx"></script>
</body>

</html>
